<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lật Thẻ — OhM!nd Lab</title>
<link rel="icon" type="image/png" href="../pic/Favicon1.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
/* ── MEMORY MATCH SPECIFIC ───────────────────────────────────── */

/* HUD */
.mm-hud{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:14px 20px;box-shadow:var(--shadow);margin-bottom:16px;}
.mm-timer{font-family:var(--mono);font-size:32px;font-weight:500;color:var(--orange);letter-spacing:2px;}
.mm-sep{width:1.5px;height:32px;background:var(--border);flex-shrink:0;}
.mm-stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
.mm-stat-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);}
.mm-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);}
.mm-progress{flex:1;min-width:100px;}
.mm-prog-lbl{font-size:11px;font-weight:700;color:var(--t3);margin-bottom:4px;}
.mm-prog-track{height:8px;background:var(--bg2);border-radius:999px;overflow:hidden;}
.mm-prog-fill{height:100%;background:var(--orange);border-radius:999px;transition:width .4s ease;}

/* CARD GRID */
.mm-grid{display:grid;gap:10px;margin:0 auto;}
.mm-card{aspect-ratio:1;perspective:600px;cursor:pointer;}
.mm-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.mm-card.flipped .mm-card-inner,.mm-card.matched .mm-card-inner{transform:rotateY(180deg);}
.mm-card-front,.mm-card-back{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* Back (face down) */
.mm-card-front{background:var(--orange);border:2px solid var(--od);box-shadow:0 3px 10px rgba(244,107,27,.25);}
.mm-card-front-pattern{width:100%;height:100%;display:grid;place-items:center;font-size:clamp(20px,4vw,36px);opacity:.4;}

/* Front (face up) */
.mm-card-back{background:var(--white);border:2px solid var(--border);transform:rotateY(180deg);box-shadow:var(--shadow);}
.mm-card-back img{width:100%;height:100%;object-fit:cover;border-radius:10px;}

/* States */
.mm-card.matched .mm-card-back{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,164,78,.25);}
.mm-card.wrong .mm-card-inner{animation:wrongShake .4s ease;}
@keyframes wrongShake{0%,100%{transform:rotateY(180deg)}25%{transform:rotateY(180deg) translateX(4px)}75%{transform:rotateY(180deg) translateX(-4px)}}
.mm-card:not(.flipped):not(.matched):hover .mm-card-front{background:var(--od);}

/* Match flash */
.match-flash{position:fixed;inset:0;background:rgba(45,164,78,.12);pointer-events:none;z-index:50;opacity:0;transition:opacity .15s;}
.match-flash.show{opacity:1;}

/* Score modal extras */
.score-big{font-family:var(--mono);font-size:48px;font-weight:500;color:var(--orange);line-height:1;margin:10px 0 4px;}
.score-sub{font-size:13px;color:var(--t2);margin-bottom:16px;}

@media(max-width:500px){
  .mm-hud{gap:8px;padding:10px 14px;}
  .mm-timer{font-size:24px;}
  .mm-grid{gap:7px;}
}
</style>
</head>
<body>
<div id="app">


<!-- RESULT MODAL -->
<div class="overlay hidden" id="rModal">
  <div class="modal" style="text-align:center">
    <div class="modal-icon">🎉</div>
    <h2>Hoàn thành!</h2>
    <div class="score-big" id="rTime">00:00</div>
    <div class="score-sub" id="rSub"></div>
    <div id="rDetails" style="margin-bottom:20px;text-align:left"></div>
    <div style="display:flex;gap:9px;justify-content:center">
      <button class="btn btn-primary" id="rSaveBtn" onclick="submitScore()">Lưu điểm</button>
      <button class="btn btn-secondary" onclick="document.getElementById('rModal').classList.add('hidden')">Đóng</button>
    </div>
  </div>
</div>

<div class="match-flash" id="matchFlash"></div>

<header>
  <div class="logo">
    <img src="../pic/OhM!nd Lab.png" style="height:80px;object-fit:contain">
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <a href="../index.html" class="btn btn-secondary btn-sm">← Trang chủ</a>
    <div class="player-chip" id="playerChip" onclick="changePlayer()" style="display:none">
      <div class="chip-av" id="chipAv">?</div>
      <span id="hName">Khách</span>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('play',this)">🃏 Chơi ngay</button>
  <button class="tab" onclick="switchTab('lb',this);loadLB()">🏆 Xếp hạng</button>
</div>

<div class="main">

  <!-- PLAY PAGE -->
  <div id="page-play" class="page active">
    <div id="listView">
      <div class="card-label" style="margin-bottom:14px">Chọn thử thách để bắt đầu</div>
      <div id="challengeList"><div style="text-align:center;padding:48px;color:var(--t3)">⏳ Đang tải...</div></div>
    </div>
    <div id="gameView" style="display:none">
      <div class="game-header">
        <button class="back-btn" onclick="backToList()">← Danh sách</button>
        <div>
          <div class="game-title" id="gameTitle">Lật Thẻ</div>
          <div class="game-subtitle" id="gameSubtitle"></div>
        </div>
      </div>
      <div id="gameArea"></div>
    </div>
  </div>

  <!-- LEADERBOARD PAGE -->
  <div id="page-lb" class="page">
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div class="card" style="flex:1;min-width:130px;margin-bottom:0;text-align:center;padding:16px">
        <div style="font-family:var(--mono);font-size:26px;font-weight:500;color:var(--orange)" id="lbTotal">—</div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-top:3px">Tổng lượt chơi</div>
      </div>
      <div class="card" style="flex:1;min-width:130px;margin-bottom:0;text-align:center;padding:16px">
        <div style="font-family:var(--mono);font-size:26px;font-weight:500;color:var(--orange)" id="lbPlayers">—</div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-top:3px">Số người chơi</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3)">Chọn ván:</div>
        <select id="lbFilter" onchange="renderLB()" style="flex:1;min-width:200px;max-width:400px;background:var(--bg);border:1.5px solid var(--border);color:var(--text);border-radius:9px;padding:8px 12px;font-family:var(--sans);font-size:13px;font-weight:600">
          <option value="all">Tất cả ván</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="loadLB()">🔄 Refresh</button>
      </div>
    </div>
    <div id="lbContent"><div style="text-align:center;padding:40px;color:var(--t3)">Đang tải...</div></div>
  </div>

</div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const _cfg = 'https://script.google.com/macros/s/AKfycby2iK5X78FucVv36FcgyKPJiEopb9gdQMpD6V11QWAnMYpNo09yetHe11V3TtNjvbwG/exec';
const _key = 'BTK2026';

// ── STATE ───────────────────────────────────────────────────
let playerName = localStorage.getItem('bb_name') || '';
let playerDept = localStorage.getItem('bb_dept') || '';
let challenges = [];
let playedChallenges = JSON.parse(localStorage.getItem('bb_memory_played') || '{}');
let G = {};
let _allScores = [], _allGroups = {};

// ── BOOT ────────────────────────────────────────────────────
window.onload = () => {
  // Nếu chưa có tên → về trang chủ nhập
  if(!playerName){ window.location.href='../index.html'; return; }
  updateHeader();
  fetchChallenges();
};

// ── PLAYER ──────────────────────────────────────────────────
function showModal(id){ document.getElementById(id).classList.remove('hidden'); }
function hideModal(id){ document.getElementById(id).classList.add('hidden'); }

function changePlayer(){
  window.location.href = '../index.html';
}
function updateHeader(){
  document.getElementById('hName').textContent = playerName||'Khách';
  document.getElementById('chipAv').textContent = (playerName||'?')[0].toUpperCase();
  document.getElementById('playerChip').style.display = 'flex';
}

// ── TABS ────────────────────────────────────────────────────
function switchTab(name, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='play') backToList();
}

// ── FETCH CHALLENGES ────────────────────────────────────────
async function fetchChallenges(){
  try{
    const res = await fetch(`${_cfg}?action=getActiveChallenges&key=${_key}&_=${Date.now()}`);
    const data = await res.json();
    challenges = (data.challenges||[]).filter(c => c.type === 'memory-match');
    renderChallengeList();
  }catch(e){
    document.getElementById('challengeList').innerHTML=`<div class="no-challenges"><div class="icon">⚠️</div><h3>Không thể tải</h3><p>${e.message}</p></div>`;
  }
}

function renderChallengeList(){
  const list = document.getElementById('challengeList');
  const now = Date.now();
  const active = challenges.filter(c => new Date(c.deadline) > now);
  if(!active.length){
    list.innerHTML=`<div class="no-challenges"><div class="icon">🃏</div><h3>Chưa có thử thách nào</h3><p>Admin sẽ tạo thử thách mới sớm thôi!</p></div>`;
    return;
  }
  list.innerHTML='';
  const grid = document.createElement('div'); grid.className='ch-grid';
  active.forEach(ch => {
    const played = playedChallenges[ch.id];
    const pairs = ch.cards ? ch.cards.length : '?';
    const card = document.createElement('div');
    card.className='ch-card'+(played?' played':'');
    card.innerHTML=`
      <div class="ch-card-top">
        <span class="ch-diff diff-medium">🃏 Lật thẻ</span>
      </div>
      <div class="ch-title">${escH(ch.title)}</div>
      <div class="ch-desc">${escH(ch.description||'Tìm tất cả các cặp thẻ giống nhau!')}</div>
      <div class="ch-meta">
        <span class="ch-meta-item">🎴 ${pairs} cặp thẻ</span>
        <span class="ch-meta-item">⏰ <span class="ch-countdown" id="cd-${ch.id}"></span></span>
      </div>
      ${played?`<div class="ch-played-badge">✅ Đã chơi — ${formatTime(played.time)}</div>`:''}`;
    card.onclick = () => startGame(ch);
    grid.appendChild(card);
    startCardCountdown(ch.id, new Date(ch.deadline));
  });
  list.appendChild(grid);
}

function startCardCountdown(id, deadline){
  const update = () => {
    const el = document.getElementById('cd-'+id); if(!el) return;
    const diff = deadline - Date.now();
    if(diff<=0){ el.textContent='Hết hạn'; return; }
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className='ch-countdown'+(diff<3600000?' urgent':'');
  };
  update(); setInterval(update,1000);
}

// ══════════════════════════════════════════════════════════════
//  GAME ENGINE
// ══════════════════════════════════════════════════════════════
function startGame(ch){
  document.getElementById('listView').style.display='none';
  document.getElementById('gameView').style.display='block';
  document.getElementById('gameTitle').textContent = ch.title;
  document.getElementById('gameSubtitle').textContent = `${ch.cards.length} cặp thẻ`;

  // Build deck: each card appears twice
  const deck = [];
  ch.cards.forEach((url, i) => {
    const fixedUrl = toDriveImg(url);
    deck.push({id: i, pairId: i, url: fixedUrl});
    deck.push({id: i + ch.cards.length, pairId: i, url: fixedUrl});
  });
  // Shuffle
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }

  G = {
    ch, deck,
    flipped: [],      // indices currently face-up (max 2)
    matched: new Set(),
    moves: 0,
    timer: 0,
    interval: null,
    started: false,   // timer starts on first flip
    done: false,
    locked: false     // prevent clicks during animation
  };

  renderGame();
}

function renderGame(){
  const ch = G.ch;
  const pairs = ch.cards.length;
  const cols = pairs <= 5 ? 5 : 10;
  const maxW = cols * 120 + (cols - 1) * 10;
  const played = playedChallenges[ch.id];

  document.getElementById('gameArea').innerHTML = `
    ${played?`<div class="already-played">✅ Đã hoàn thành với <strong>${formatTime(played.time)}</strong>. Chơi lại không tính điểm.</div>`:''}
    <div class="mm-hud">
      <div class="mm-timer" id="mmTimer">00:00</div>
      <div class="mm-sep"></div>
      <div class="mm-stat">
        <div class="mm-stat-val" id="mmMoves">0</div>
        <div class="mm-stat-lbl">Lượt lật</div>
      </div>
      <div class="mm-sep"></div>
      <div class="mm-stat">
        <div class="mm-stat-val" id="mmMatched" style="color:var(--green)">0</div>
        <div class="mm-stat-lbl">Cặp đúng</div>
      </div>
      <div class="mm-sep"></div>
      <div class="mm-progress">
        <div class="mm-prog-lbl" id="mmProgLbl">0 / ${pairs} cặp</div>
        <div class="mm-prog-track"><div class="mm-prog-fill" id="mmProgFill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="mm-grid" id="mmGrid" style="grid-template-columns:repeat(${cols},1fr);max-width:${maxW}px"></div>`;

  buildGrid();
}

function buildGrid(){
  const grid = document.getElementById('mmGrid');
  grid.innerHTML = '';
  G.deck.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'mm-card';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="mm-card-inner">
        <div class="mm-card-front">
          <div class="mm-card-front-pattern">🧩</div>
        </div>
        <div class="mm-card-back">
          <img src="${escH(card.url)}" draggable="false" alt="thẻ ${card.pairId+1}" onerror="this.onerror=null;this.replaceWith(Object.assign(document.createElement('div'),{textContent:'🖼️',style:'font-size:32px;opacity:.4'}))">
        </div>
      </div>`;
    el.addEventListener('click', () => onCardClick(idx));
    grid.appendChild(el);
  });
}

function onCardClick(idx){
  if(G.done || G.locked) return;
  if(G.flipped.includes(idx)) return;
  if(G.matched.has(G.deck[idx].pairId)) return;

  // Start timer on first flip
  if(!G.started){
    G.started = true;
    G.interval = setInterval(()=>{
      G.timer++;
      const el = document.getElementById('mmTimer');
      if(el) el.textContent = formatTime(G.timer);
    }, 1000);
  }

  // Flip card
  const cardEl = document.querySelector(`.mm-card[data-idx="${idx}"]`);
  cardEl.classList.add('flipped');
  G.flipped.push(idx);

  if(G.flipped.length === 2){
    G.moves++;
    const el = document.getElementById('mmMoves');
    if(el) el.textContent = G.moves;
    G.locked = true;
    checkMatch();
  }
}

function checkMatch(){
  const [i1, i2] = G.flipped;
  const c1 = G.deck[i1], c2 = G.deck[i2];

  if(c1.pairId === c2.pairId){
    // Match!
    G.matched.add(c1.pairId);
    G.flipped = [];
    G.locked = false;

    // Mark matched
    [i1,i2].forEach(idx => {
      document.querySelector(`.mm-card[data-idx="${idx}"]`).classList.add('matched');
    });

    // Flash
    const flash = document.getElementById('matchFlash');
    flash.classList.add('show');
    setTimeout(()=>flash.classList.remove('show'), 250);

    updateHUD();

    if(G.matched.size === G.ch.cards.length){
      setTimeout(()=>endGame(), 400);
    }
  } else {
    // No match — flip back after delay
    setTimeout(()=>{
      [i1,i2].forEach(idx => {
        const el = document.querySelector(`.mm-card[data-idx="${idx}"]`);
        el.classList.add('wrong');
        el.classList.remove('flipped');
        setTimeout(()=>el.classList.remove('wrong'), 400);
      });
      G.flipped = [];
      G.locked = false;
    }, 900);
  }
}

function updateHUD(){
  const matched = document.getElementById('mmMatched');
  const fill = document.getElementById('mmProgFill');
  const lbl = document.getElementById('mmProgLbl');
  const pairs = G.ch.cards.length;
  if(matched) matched.textContent = G.matched.size;
  if(fill) fill.style.width = (G.matched.size / pairs * 100)+'%';
  if(lbl) lbl.textContent = `${G.matched.size} / ${pairs} cặp`;
}

function endGame(){
  G.done = true;
  clearInterval(G.interval);

  document.getElementById('rTime').textContent = formatTime(G.timer);
  document.getElementById('rSub').textContent = `${G.moves} lượt lật • ${G.ch.cards.length} cặp thẻ`;
  document.getElementById('rDetails').innerHTML = `
    <div class="result-row"><span>⏱ Thời gian</span><span class="result-val">${formatTime(G.timer)}</span></div>
    <div class="result-row"><span>🃏 Số lượt lật</span><span class="result-val">${G.moves}</span></div>
    <div class="result-row"><span>🎯 Cặp tìm đúng</span><span class="result-val">${G.ch.cards.length} / ${G.ch.cards.length}</span></div>
    <div class="result-row"><span>👤 Người chơi</span><span class="result-val">${escH(playerName)}</span></div>`;
  document.getElementById('rSaveBtn').textContent = 'Lưu điểm';
  showModal('rModal');
}

// ── SUBMIT SCORE ────────────────────────────────────────────
async function submitScore(){
  const btn = document.getElementById('rSaveBtn');
  btn.innerHTML = '<span class="spinner"></span>';
  try{
    await fetch(`${_cfg}?action=addScore&key=${_key}&name=${encodeURIComponent(playerName)}&dept=${encodeURIComponent(playerDept||'')}&game=MemoryMatch&title=${encodeURIComponent(G.ch.title)}&time=${G.timer}&challengeId=${G.ch.id}&errors=${G.moves}&timestamp=${encodeURIComponent(new Date().toISOString())}`);
    playedChallenges[G.ch.id] = {time: G.timer};
    localStorage.setItem('bb_memory_played', JSON.stringify(playedChallenges));
    showToast('✅ Điểm đã lưu!','ok');
  }catch(e){ showToast('❌ Lỗi kết nối','bad'); }
  btn.textContent = 'Đã lưu ✓';
  setTimeout(()=>hideModal('rModal'), 1000);
}

function backToList(){
  if(G.interval) clearInterval(G.interval);
  G = {};
  document.getElementById('gameView').style.display='none';
  document.getElementById('listView').style.display='block';
  fetchChallenges();
}

// ── LEADERBOARD ─────────────────────────────────────────────
async function loadLB(){
  const content = document.getElementById('lbContent');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--t3)">Đang tải...</div>';
  try{
    const res = await fetch(`${_cfg}?action=getScores&key=${_key}&challengeId=all&_=${Date.now()}`);
    const data = await res.json();
    _allScores = (data.scores||[]).filter(s => s.game==='MemoryMatch');
    document.getElementById('lbTotal').textContent = _allScores.length;
    document.getElementById('lbPlayers').textContent = new Set(_allScores.map(s=>s.name)).size;
    _allGroups = {};
    _allScores.forEach(s=>{
      const cid = String(s.challengeId||'?');
      if(!_allGroups[cid]) _allGroups[cid]=[];
      _allGroups[cid].push(s);
    });
    const sel = document.getElementById('lbFilter');
    while(sel.options.length>1) sel.remove(1);
    Object.keys(_allGroups).sort((a,b)=>+b-+a).forEach(cid=>{
      const ch = challenges.find(c=>String(c.id)===cid);
      const opt = document.createElement('option');
      opt.value=cid; opt.textContent=ch?.title||`Ván #${cid}`;
      sel.appendChild(opt);
    });
    renderLB();
  }catch(e){
    content.innerHTML=`<div style="text-align:center;padding:40px;color:var(--t3)">❌ ${e.message}</div>`;
  }
}

function renderLB(){
  const content = document.getElementById('lbContent');
  if(!_allScores.length){
    content.innerHTML='<div style="text-align:center;padding:48px;color:var(--t3)">🚀 Chưa có ai hoàn thành!</div>';
    return;
  }
  const filter = document.getElementById('lbFilter')?.value||'all';
  const ri = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style="font-family:var(--mono);color:var(--t3)">#${i+1}</span>`;

  const renderTable = rows => {
    const sorted = [...rows].sort((a,b)=>(+a.time||0)-(+b.time||0));
    return `<table style="width:100%;border-collapse:collapse">
      <thead><tr>
        ${['Hạng','Tên','Phòng ban','Thời gian','Số lượt lật'].map(h=>`<th style="text-align:left;padding:9px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);border-bottom:1.5px solid var(--border);font-weight:700">${h}</th>`).join('')}
      </tr></thead>
      <tbody>${sorted.map((s,i)=>`<tr style="background:${s.name===playerName?'var(--ol)':''}">
        <td style="padding:10px 12px;border-bottom:1px solid var(--bg2)">${ri(i)}</td>
        <td style="padding:10px 12px;border-bottom:1px solid var(--bg2);font-weight:700;color:${s.name===playerName?'var(--orange)':'var(--text)'}">
          ${escH(s.name)}${s.name===playerName?'<span style="font-size:10px;background:var(--ol);color:var(--orange);border:1px solid var(--om);border-radius:999px;padding:1px 6px;margin-left:4px">bạn</span>':''}
        </td>
        <td style="padding:10px 12px;border-bottom:1px solid var(--bg2);color:var(--t2);font-size:13px">${escH(s.dept||'—')}</td>
        <td style="padding:10px 12px;border-bottom:1px solid var(--bg2);font-family:var(--mono);color:var(--orange);font-weight:700;font-size:15px">${formatTime(+s.time)}</td>
        <td style="padding:10px 12px;border-bottom:1px solid var(--bg2);color:var(--t2);font-weight:600">${s.errors||'—'}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  };

  if(filter==='all'){
    const cids = Object.keys(_allGroups).sort((a,b)=>+b-+a);
    content.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:16px">
      ${cids.map(cid=>{
        const ch=challenges.find(c=>String(c.id)===cid);
        const title=ch?.title||_allGroups[cid][0]?.title||`Ván #${cid}`;
        return `<div style="flex:1;min-width:320px;background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow)">
          <div style="font-size:15px;font-weight:800;margin-bottom:14px">${escH(title)}</div>
          ${renderTable(_allGroups[cid])}
        </div>`;
      }).join('')}
    </div>`;
  }else{
    const rows = _allGroups[filter]||[];
    content.innerHTML=`<div class="card">${renderTable(rows)}</div>`;
  }
}

// ── HELPERS ─────────────────────────────────────────────────
// Chuyển mọi kiểu link Google Drive (share link, /view, /open?id=...) sang link ảnh trực tiếp
function toDriveImg(url){
  if(!url) return url;
  url = String(url).trim();
  // Đã là link trực tiếp (thumbnail, googleusercontent) → giữ nguyên
  if(/lh3\.googleusercontent\.com|drive\.google\.com\/thumbnail/.test(url)) return url;
  if(!/drive\.google\.com/.test(url)) return url;

  let id = null;
  let m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);         // .../file/d/ID/view
  if(m) id = m[1];
  if(!id){
    m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);          // .../open?id=ID hoặc uc?id=ID
    if(m) id = m[1];
  }
  if(!id) return url; // không nhận diện được → giữ nguyên, khỏi làm hỏng link gốc

  return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
}

function formatTime(s){ return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function escH(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
